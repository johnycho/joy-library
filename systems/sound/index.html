<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>소리 재생 · 사운드 QR</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="../../shared/theme.css" />
</head>
<body>
<div class="wrap">
  <a class="crumb" href="../../">← 시스템 허브</a>
  <div class="topbar">
    <span class="brand"><span class="dot">🔊</span><span>소리 재생<small>카테고리를 고르면 랜덤 사운드</small></span></span>
  </div>

  <div class="hero">
    <h1>버튼을 누르면<br><span class="hl">무작위 소리</span>가 나와요</h1>
    <p>원하는 카테고리를 누르면 그 안의 여러 소리 중 하나가 랜덤으로 재생됩니다.</p>
  </div>

  <div class="seclbl">카테고리 선택</div>
  <div class="cats" id="cats"></div>

  <div class="stage">
    <div class="eyebrow" id="eyebrow">탭하면 재생</div>
    <div class="orb"><div class="ring" id="orbRing"></div><div class="eq" id="eq"></div></div>
    <div class="now">
      <div class="nlbl">지금 재생 중</div>
      <div class="nval" id="nowName">카테고리를 골라주세요</div>
      <div class="ncat" id="nowCat"></div>
    </div>
  </div>

  <div class="seclbl">공유</div>
  <a class="btn ghost" id="qrLink" href="../qr/">이 페이지의 QR 만들기 →</a>

  <div class="foot">소리 추가: sounds/&lt;카테고리&gt; 폴더에 mp3 파일만 넣으면 됩니다 · 파일명이 그대로 화면에 표시돼요</div>
</div>

<audio id="player" preload="auto"></audio>

<script src="../../shared/discover.js"></script>
<script>
/* 카테고리 정의 (폴더 이름 = id). 소리 목록은 sounds/<id>/ 에서 자동 수집됩니다. */
const CATS = [
  {id:"animal", name:"동물",   ico:"🐾", color:"var(--c-animal)"},
  {id:"inst",   name:"악기",   ico:"🎹", color:"var(--c-inst)"},
  {id:"nature", name:"자연",   ico:"🌿", color:"var(--c-nature)"},
  {id:"fx",     name:"효과음", ico:"✨", color:"var(--c-fx)"},
  {id:"melody", name:"멜로디", ico:"🎵", color:"var(--c-melody)"},
];
let SOUNDMAP = {};
const last = {};

function labelOf(file){ return file.replace(/\.mp3$/i, ""); }

async function loadSounds(){
  let map = {};
  const files = await Discover.listFiles("sounds");   // ["animal/cat.mp3", ...] 또는 null
  if (files) {
    files.forEach(p => { const m = p.match(/^([^/]+)\/(.+\.mp3)$/i); if (m) (map[m[1]] = map[m[1]] || []).push(m[2]); });
  } else {
    map = await fetch("sounds/manifest.json", {cache:"no-store"}).then(r=>r.ok?r.json():{}).catch(()=>({}));
  }
  SOUNDMAP = map || {};
  CATS.forEach(c => {
    const btn = document.querySelector('.cat[data-cat="'+c.id+'"]'); if (!btn) return;
    const n = (SOUNDMAP[c.id]||[]).length;
    btn.querySelector(".ccnt").textContent = n ? n + "가지 소리" : "소리 없음";
    btn.classList.toggle("empty", n === 0);
  });
}

/* 오디오 + 비주얼라이저 */
const audioEl = document.getElementById("player");
let AC, ANALYSER, FREQ, SRC;
function audio(){
  if (!AC){
    AC = new (window.AudioContext || window.webkitAudioContext)();
    SRC = AC.createMediaElementSource(audioEl);
    ANALYSER = AC.createAnalyser(); ANALYSER.fftSize = 128;
    FREQ = new Uint8Array(ANALYSER.frequencyBinCount);
    SRC.connect(ANALYSER); ANALYSER.connect(AC.destination);
    requestAnimationFrame(drawEq);
  }
  if (AC.state === "suspended") AC.resume();
}
const eqEl=document.getElementById("eq"), ringEl=document.getElementById("orbRing");
const BARS=24; for(let i=0;i<BARS;i++) eqEl.appendChild(document.createElement("span"));
const barEls=[...eqEl.children];
function drawEq(){
  requestAnimationFrame(drawEq);
  if(!ANALYSER) return;
  ANALYSER.getByteFrequencyData(FREQ);
  let peak=0;
  for(let i=0;i<BARS;i++){
    const v=FREQ[i+1]||0; peak=Math.max(peak,v);
    const h = v<8 ? (9+Math.sin(Date.now()/420+i*0.5)*4) : (10+(v/255)*84);
    barEls[i].style.height=h.toFixed(1)+"px";
  }
  ringEl.style.transform="scale("+(0.6+(peak/255)*0.7).toFixed(3)+")";
}

function renderCats(){
  const wrap=document.getElementById("cats"); wrap.innerHTML="";
  CATS.forEach(c=>{
    const b=document.createElement("button");
    b.className="cat"; b.type="button"; b.dataset.cat=c.id; b.style.setProperty("--cc", c.color);
    b.innerHTML='<span class="cico">'+c.ico+'</span><span class="cname">'+c.name+'</span><span class="ccnt">불러오는 중…</span>';
    b.addEventListener("click", ()=>playCategory(c, b));
    wrap.appendChild(b);
  });
}
function playCategory(cat, btn){
  const list = SOUNDMAP[cat.id] || [];
  document.querySelectorAll(".cat").forEach(x=>x.classList.remove("active"));
  if (btn) btn.classList.add("active");
  document.getElementById("nowCat").textContent = cat.ico+" "+cat.name;
  document.getElementById("nowCat").style.color = cat.color;
  document.documentElement.style.setProperty("--glow", cat.color);
  if (!list.length){
    document.getElementById("eyebrow").textContent = "비어 있음";
    document.getElementById("nowName").textContent = "이 폴더에 mp3가 없어요";
    return;
  }
  audio();
  let pick; do { pick = list[Math.floor(Math.random()*list.length)]; } while (list.length>1 && pick===last[cat.id]);
  last[cat.id] = pick;
  audioEl.src = encodeURI("sounds/"+cat.id+"/"+pick);
  audioEl.currentTime = 0; audioEl.play().catch(()=>{});
  document.getElementById("eyebrow").textContent = "재생 중";
  document.getElementById("nowName").textContent = labelOf(pick);
}

// QR 만들기 링크에 현재 페이지 주소를 채워줌
document.getElementById("qrLink").href = "../qr/?url=" + encodeURIComponent(location.href);

renderCats();
loadSounds();
</script>
</body>
</html>
