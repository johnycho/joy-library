<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>시스템 허브</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="shared/theme.css" />
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <span class="brand"><span class="dot">🧩</span><span>시스템 허브<small>QR로 여는 작은 도구 모음</small></span></span>
  </div>

  <div class="hero">
    <h1><span class="hl">원하는 시스템</span>을<br>골라서 열어보세요</h1>
    <p>각 시스템은 systems 폴더 안에 독립된 디렉터리로 들어 있어요. 새 폴더를 추가하면 여기에 자동으로 나타납니다.</p>
  </div>

  <div class="seclbl">사용할 수 있는 시스템</div>
  <div class="syscards" id="cards"><div class="empty">불러오는 중…</div></div>

  <div class="foot">새 시스템 추가: systems/&lt;이름&gt;/ 폴더에 index.html 과 system.json 을 넣으면 끝</div>
</div>

<script src="shared/discover.js"></script>
<script>
async function loadSystems(){
  let ids = [];
  const files = await Discover.listFiles("systems");   // ["sound/system.json", ...] 또는 null
  if (files) {
    const set = new Set();
    files.forEach(p => { const m = p.match(/^([^/]+)\/system\.json$/); if (m) set.add(m[1]); });
    ids = [...set];
  } else {
    // 폴백: 액션이 만들어 둔 목록
    ids = await fetch("systems/registry.json", {cache:"no-store"}).then(r=>r.ok?r.json():[]).catch(()=>[]);
  }

  const metas = await Promise.all(ids.map(id =>
    fetch("systems/" + id + "/system.json").then(r => r.ok ? r.json() : null)
      .then(j => j ? Object.assign({id}, j) : null).catch(() => null)
  ));

  const list = metas.filter(Boolean).sort((a,b)=>(a.order||99)-(b.order||99) || a.title.localeCompare(b.title,"ko"));
  const box = document.getElementById("cards");
  if (!list.length){ box.innerHTML = '<div class="empty">아직 등록된 시스템이 없어요. systems 폴더에 추가해 주세요.</div>'; return; }
  box.innerHTML = "";
  list.forEach(s => {
    const a = document.createElement("a");
    a.className = "syscard"; a.href = "systems/" + s.id + "/";
    if (s.color) a.style.setProperty("--cc", s.color);
    a.innerHTML =
      '<span class="sico">' + (s.icon || "📦") + '</span>' +
      '<span class="stitle">' + (s.title || s.id) + '</span>' +
      '<span class="sdesc">' + (s.desc || "") + '</span>' +
      '<span class="sgo">열기 →</span>';
    box.appendChild(a);
  });
}
loadSystems();
</script>
</body>
</html>
